name: Publicar KML

on:
  schedule:
    - cron: '0 * * * *'   # cada 60 min
  workflow_dispatch:
    inputs:
      prueba:
        description: 'Enviar mensaje de PRUEBA a Telegram (datos ficticios)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: windows-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restaurar KMLs previos desde live (si existe)
        shell: pwsh
        run: |
          git fetch origin live 2>$null
          if (git branch -r | Select-String 'origin/live') {
            git checkout origin/live -- red_alertas.kml    2>$null
            git checkout origin/live -- red_pronostico.kml 2>$null
            git checkout origin/live -- red_sismos.kml      2>$null
            git checkout origin/live -- organizaciones.json 2>$null
            git checkout origin/live -- dmc_estado.json     2>$null
            git checkout origin/live -- racha_lluvia.json   2>$null
            git checkout origin/live -- redes_regionales_estado.json 2>$null
            git checkout origin/live -- alertas_diarias.json 2>$null
            git checkout origin/live -- redmeteo_estado.json 2>$null
          }
          exit 0

      - name: Generar KMLs
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PRUEBA:           ${{ inputs.prueba }}
        run: |
          $ErrorActionPreference = 'Continue'
          .\Actualizar.ps1
          exit 0

      - name: Publicar en rama live
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan live-tmp
          git rm -rf --cached . 2>$null
          Remove-Item .gitignore -ErrorAction SilentlyContinue
          git add red_alertas.kml
          if (Test-Path red_pronostico.kml) { git add red_pronostico.kml }
          if (Test-Path red_sismos.kml)     { git add red_sismos.kml }
          if (Test-Path organizaciones.json) { git add organizaciones.json }
          if (Test-Path dmc_estado.json)    { git add dmc_estado.json }
          if (Test-Path racha_lluvia.json)  { git add racha_lluvia.json }
          if (Test-Path redes_regionales_estado.json) { git add redes_regionales_estado.json }
          if (Test-Path alertas_diarias.json) { git add alertas_diarias.json }
          if (Test-Path redmeteo_estado.json)  { git add redmeteo_estado.json }
          git commit -m "data: actualizar KMLs $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
          git push origin HEAD:live --force
